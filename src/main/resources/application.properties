spring.application.name=ai-code-tutor-backend
server.port=${PORT:8080}

# DataSource is configured programmatically in DatabaseConfig.java
# to handle Render's DATABASE_URL format conversion to JDBC format
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=WARN

# AI API key
groq.api.key=${GROQ_API_KEY}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=3600000

# Allowed frontend origin for CORS
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:https://code-tutor-frontend.vercel.app}
