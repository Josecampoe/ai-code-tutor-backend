spring.application.name=ai-code-tutor-backend
server.port=${PORT:8080}

# Database — credentials must be set as environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=WARN

# AI API key
groq.api.key=${GROQ_API_KEY}

# JWT — secret must be at least 256 bits (32+ chars), set as environment variable
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=3600000

# Allowed frontend origin for CORS
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:https://code-tutor-frontend.vercel.app}
