spring.application.name=ai-code-tutor-backend
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=WARN

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION:86400000}

# AI API
ai.api.key=${AI_API_KEY}
ai.api.url=${AI_API_URL:https://api.anthropic.com/v1/messages}

# Groq API (legacy)
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.1-8b-instant

# Code execution — Judge0 CE public instance
judge0.api.url=${JUDGE0_API_URL:https://ce.judge0.com}

# App
app.allowed-origins=${ALLOWED_ORIGINS}
app.environment=${APP_ENV:production}
app.seed-lessons=false
